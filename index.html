<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050a12;
            color: #0ff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Arc Reactor CSS Animation */
        .reactor-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0.15;
            transition: opacity 0.5s ease;
        }
        
        .reactor-container.active {
            opacity: 0.8;
            animation: pulse-glow 1.5s infinite alternate;
        }

        .arc {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid cyan;
            box-shadow: 0 0 50px cyan, inset 0 0 50px cyan;
            position: relative;
            animation: spin 10s linear infinite;
        }

        .arc::before, .arc::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        .arc::before {
            width: 380px; height: 380px;
            border: 4px dashed rgba(0, 255, 255, 0.5);
            animation: spin-reverse 15s linear infinite;
        }

        .arc::after {
            width: 250px; height: 250px;
            border: 15px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px cyan;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: translate(-50%, -50%) rotate(-360deg); } }
        @keyframes pulse-glow { 100% { box-shadow: 0 0 100px #0ff, inset 0 0 100px #0ff; transform: translate(-50%, -50%) scale(1.05); } }

        /* HUD Interface Overlay */
        .hud {
            position: relative;
            z-index: 10;
            width: 800px;
            height: 80vh;
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            font-size: 2em;
            letter-spacing: 5px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px cyan;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 0.4em;
            padding: 5px 10px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid cyan;
            border-radius: 3px;
            animation: blink 2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
            counter-reset: line;
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: cyan;
        }

        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 3px solid cyan;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), transparent);
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        .msg.user {
            border-right: 3px solid #ffaa00;
            border-left: none;
            background: linear-gradient(-90deg, rgba(255, 170, 0, 0.1), transparent);
            text-align: right;
            color: #ffaa00;
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: cyan;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1em;
            outline: none;
        }

        input[type="text"]:focus {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        button {
            background: transparent;
            color: cyan;
            border: 1px solid cyan;
            padding: 0 30px;
            font-family: inherit;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 20px cyan;
        }

        .pulse-btn {
            background: rgba(0, 255, 255, 0.1);
        }
        
        .pulse-btn.recording {
            background: rgba(255, 0, 0, 0.3);
            border-color: red;
            color: red;
            box-shadow: 0 0 30px red;
            animation: breath 1s infinite alternate;
        }

        @keyframes breath {
            100% { box-shadow: 0 0 50px red; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="reactor-container" id="reactor">
        <div class="arc"></div>
    </div>

    <div class="hud">
        <div class="header">
            <div>J.A.R.V.I.S.</div>
            <div class="status-badge" id="status">SYS: ONLINE</div>
        </div>
        
        <div class="chat-container" id="chat-box">
            <div class="msg">System initialized. Awaiting input, Sharun.</div>
        </div>

        <div class="controls">
            <button class="pulse-btn" id="mic-btn" onclick="toggleMic()">[ MIC ]</button>
            <input type="text" id="text-input" placeholder="Type command..." autocomplete="off">
            <button onclick="sendText()">SEND</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const inputField = document.getElementById("text-input");
        const reactor = document.getElementById("reactor");
        const statusBadge = document.getElementById("status");
        const micBtn = document.getElementById("mic-btn");

        let recognition;
        let isRecording = false;

        // Initialize Web Speech API for perfectly seamless Voice-to-Text
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add("recording");
                micBtn.innerText = "[ REC ]";
                statusBadge.innerText = "SYS: LISTENING";
                statusBadge.style.color = "red";
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                appendMessage(text, "user");
                processMessage(text);
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove("recording");
                micBtn.innerText = "[ MIC ]";
                statusBadge.innerText = "SYS: ONLINE";
                statusBadge.style.color = "cyan";
            };
        }

        function toggleMic() {
            if (!recognition) return alert("Browser does not support Voice Recognition.");
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        inputField.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendText();
        });

        function sendText() {
            const text = inputField.value.trim();
            if(!text) return;
            inputField.value = "";
            appendMessage(text, "user");
            processMessage(text);
        }

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = "msg " + sender;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1; // Slightly faster for Jarvis feel
            window.speechSynthesis.speak(utterance);
        }

        async function processMessage(text) {
            // Activate Arc Reactor UI state
            reactor.classList.add("active");
            statusBadge.innerText = "SYS: PROCESSING...";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                
                appendMessage(data.response, "jarvis");
                speakText(data.response);
            } catch(e) {
                appendMessage("CONNECTION ERROR: Make sure you leave the black terminal window open in the background!", "jarvis");
                speakText("I am unable to reach the server. Please ensure the terminal window is open.");
            }

            reactor.classList.remove("active");
            if(!isRecording) statusBadge.innerText = "SYS: ONLINE";
        }
    </script>
</body>
</html>
